apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-lab-webapp.name" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "k8s-lab-webapp.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "k8s-lab-webapp.name" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.containerPort }}
          env:
            - name: APP_VERSION
              value: {{ .Values.backend.image.tag | quote }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "k8s-lab-webapp.name" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}