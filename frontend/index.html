<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K8s Lab WebApp</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="eyebrow">Local Kubernetes Lab</p>
      <h1>K8s Lab WebApp</h1>
      <p>Frontend + Backend nhỏ để thực hành Docker, Kubernetes, Helm Chart và Argo CD trong môi trường local.</p>
    </section>

    <section class="card">
      <h2>Backend status</h2>
      <pre id="info">Loading...</pre>
      <button id="refresh">Refresh API</button>
    </section>

    <section class="card">
      <h2>Todo lab checklist</h2>
      <form id="todo-form">
        <input id="todo-input" placeholder="Thêm task lab..." />
        <button type="submit">Add</button>
      </form>
      <ul id="todos"></ul>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
