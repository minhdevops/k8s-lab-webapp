apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-lab-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-lab-backend
  template:
    metadata:
      labels:
        app: k8s-lab-backend
    spec:
      containers:
        - name: backend
          image: k8s-lab-backend:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "1.0.0"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: k8s-lab-backend
  ports:
    - port: 3000
      targetPort: 3000
